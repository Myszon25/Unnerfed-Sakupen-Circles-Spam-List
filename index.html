<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;800&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Rubik', sans-serif;
    background:black;
    color:white;
}

/* CONTAINER */
.list{
    width:100%;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

/* LEVEL BOX */
.level{
    display:flex;
    align-items:center;
    gap:15px;

    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:12px;

    padding:10px;

    cursor:pointer;
    transition:0.2s;

    height:70px;
}

.level:hover{
    transform:scale(1.02);
    background:rgba(255,255,255,0.1);
}

/* IMAGE */
.level img{
    width:120px;
    height:60px;
    object-fit:cover;
    border-radius:8px;
}

/* TEXT */
.info{
    display:flex;
    flex-direction:column;
}

.name{
    font-size:18px;
    font-weight:800;
}

.sub{
    font-size:12px;
    opacity:0.7;
}

.place{
    margin-left:auto;
    font-size:20px;
    font-weight:800;
    opacity:0.8;
}

</style>
</head>

<body>

<div class="list" id="list"></div>

<script>
fetch("levels.json")
.then(r => r.json())
.then(data => {

    // sortowanie po place
    data.sort((a,b)=>a.place-b.place);

    const list = document.getElementById("list");

    data.forEach(level => {

        const div = document.createElement("div");
        div.className = "level";

        div.innerHTML = `
            <img src="${level.gif}">
            
            <div class="info">
                <div class="name">${level.name}</div>
                <div class="sub">by ${level.author} • ${level.chance}</div>
            </div>

            <div class="place">#${level.place}</div>
        `;

        // klik = YouTube level (możesz zmienić na stronę levela)
        div.onclick = () => {
            window.location.href = "https://www.youtube.com/watch?v=" + level.youtube;
        };

        list.appendChild(div);

    });

});
</script>

</body>
</html>
