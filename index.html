<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:black;
    font-family:'Rubik', sans-serif;
    color:white;
    overflow-x:hidden;
}

/* ===================== */
/*      NAVBAR UPGRADE   */
/* ===================== */

.navbar{
    position:sticky;
    top:0;
    z-index:999;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:14px 22px;

    background:rgba(10,10,10,0.65);
    backdrop-filter: blur(18px);

    border-bottom:1px solid rgba(255,255,255,0.12);

    box-shadow:
        0 10px 30px rgba(0,0,0,0.6);
}

/* gradient title */
.logo{
    font-size:26px;
    font-weight:800;

    background:linear-gradient(90deg,#fff,#9b7bff,#00d4ff,#fff);
    background-size:300%;

    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;

    animation: move 6s linear infinite;

    letter-spacing:0.5px;
}

@keyframes move{
    0%{background-position:0%;}
    100%{background-position:300%;}
}

.right-nav{
    display:flex;
    align-items:center;
    gap:12px;
}

/* searchbar */
#searchBar{
    width:260px;
    padding:10px 14px;

    border-radius:12px;

    border:1px solid rgba(255,255,255,0.15);

    background:rgba(255,255,255,0.05);
    color:white;

    outline:none;

    transition:0.25s;
}

#searchBar:focus{
    width:290px;
    border-color:#9b7bff;
    box-shadow:0 0 15px rgba(155,123,255,0.35);
}

/* discord button */
.discord{
    display:flex;
    align-items:center;
    gap:8px;

    padding:10px 14px;

    border-radius:12px;

    background:#5865F2;

    color:white;
    text-decoration:none;

    font-weight:700;

    transition:0.25s;
}

.discord:hover{
    transform:translateY(-2px);
    box-shadow:0 0 20px rgba(88,101,242,0.5);
}

.discord svg{
    width:20px;
    height:20px;
}

/* MOBILE */
@media(max-width:700px){

    .navbar{
        flex-direction:column;
        gap:10px;
    }

    #searchBar{
        width:200px;
    }

    #searchBar:focus{
        width:220px;
    }

    .logo{
        font-size:22px;
        text-align:center;
    }
}

/* ===================== */
/*  RESZTA TWOJEGO KODU  */
/* ===================== */

.container{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    gap:15px;
}

.card{
    width: min(900px, 95vw);
    height: 220px;

    display:flex;
    border-radius:18px;
    overflow:hidden;

    border:2px solid white;
    background:#0a0a0a;

    position:relative;
}

.left{ width:35%; height:100%; }
.left img{ width:100%; height:100%; object-fit:cover; }

.right{ width:65%; height:100%; }
.right img{ width:100%; height:100%; object-fit:cover; }

.info{
    position:absolute;
    top:10px;
    left:10px;
}

.title{
    font-size:20px;
    font-weight:800;
}

.sub{
    font-size:12px;
    opacity:0.8;
    line-height:1.2;
}

.chance{
    position:absolute;
    top:10px;
    right:10px;
    font-weight:800;
}

.wr{
    position:absolute;
    bottom:10px;
    right:10px;

    padding:5px 10px;
    border-radius:12px;

    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.5);

    font-size:12px;
    text-decoration:none;
    color:white;
}

@media (max-width: 768px){
    .card{ height:200px; }
}

@media (max-width: 480px){
    .card{ height:180px; }
    .title{ font-size:16px; }
}

.title,
.sub,
.chance,
.wr{
    text-shadow:
        -1px -1px 0 #000,
         1px -1px 0 #000,
        -1px  1px 0 #000,
         1px  1px 0 #000;
}

</style>
</head>

<body>

<div class="navbar">

    <div class="logo">
        Luck Based Level List
    </div>

    <div class="right-nav">

        <input type="text" id="searchBar" placeholder="Search level...">

        <a class="discord" href="YOUR_DISCORD_LINK" target="_blank">
            <svg viewBox="0 0 127.14 96.36">
                <path fill="currentColor"
                d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83A72.37,72.37,0,0,0,45.64,0A105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21A105.73,105.73,0,0,0,32.71,96.36A77.7,77.7,0,0,0,39.6,85.23A68.42,68.42,0,0,1,28.76,80.05C29.67,79.39,30.56,78.71,31.42,77.99A75.57,75.57,0,0,0,95.71,78C96.58,78.72,97.47,79.4,98.38,80.06A68.68,68.68,0,0,1,87.52,85.25A77,77,0,0,0,94.41,96.37A105.25,105.25,0,0,0,126.58,80.2C129.22,52.84,122.07,29.11,107.7,8.07Z"/>
            </svg>
            Discord
        </a>

    </div>

</div>

<div class="container" id="container"></div>

<script>

let container = document.getElementById("container");
let searchBar = document.getElementById("searchBar");

let levelsData = [];

function render(data){

    container.innerHTML = "";

    data.forEach(l=>{

        let card = document.createElement("div");
        card.className="card";

        card.innerHTML=`
        <div class="left">
            <img src="https://img.youtube.com/vi/${l.youtube}/hqdefault.jpg">
        </div>

        <div class="right">
            <img src="${l.gif}">
        </div>

        <div class="info">
            <div class="title">#${l.place} ${l.name}</div>
            <div class="sub">by ${l.author}<br>id: ${l.id}</div>
        </div>

        <div class="chance">${l.chance}</div>

        <a class="wr" href="${l.wrLink}" target="_blank">
            ${l.wrName}
        </a>
        `;

        container.appendChild(card);
    });
}

fetch("levels.json")
.then(r=>r.json())
.then(data=>{
    levelsData = data.sort((a,b)=>a.place-b.place);
    render(levelsData);
});

searchBar.addEventListener("input",()=>{
    let v = searchBar.value.toLowerCase();

    let filtered = levelsData.filter(l=>
        l.name.toLowerCase().includes(v) ||
        l.author.toLowerCase().includes(v) ||
        String(l.id).includes(v)
    );

    render(filtered);
});

</script>

</body>
</html>
