<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">

<style>
    :root {
        --bg-dark: #020204;
        --card-surface: #0a0a0f;
        --neon-purple: #a855f7;
        --neon-cyan: #06b6d4;
        --neon-pink: #f43f5e;
        --discord-color: #5865F2;
        --border-glow: rgba(168, 85, 247, 0.2);
    }

    /* PREMIUM GLITCH-FREE SMOOTH SCROLL */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: #1f1f2e; border-radius: 20px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--neon-cyan); }

    body {
        margin: 0;
        background: var(--bg-dark);
        font-family: 'Space Grotesk', sans-serif;
        color: #f3f4f6;
        overflow-x: hidden;
        padding-top: 120px;
        min-height: 100vh;
    }

    /* CYBER HUD BACKGROUND */
    .bg-matrix {
        position: fixed;
        inset: 0;
        z-index: -1;
        background-image: 
            radial-gradient(circle at 0% 0%, rgba(168, 85, 247, 0.08) 0%, transparent 40%),
            radial-gradient(circle at 100% 100%, rgba(6, 182, 212, 0.08) 0%, transparent 40%),
            linear-gradient(rgba(255,255,255,0.003) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.003) 1px, transparent 1px);
        background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px;
        opacity: 0.8;
    }

    /* ===================== */
    /* INTERSTELLAR NAVBAR   */
    /* ===================== */

    .navbar {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        
        width: 92%;
        max-width: 1240px;
        box-sizing: border-box;
        
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 24px;
        border-radius: 20px;

        background: rgba(6, 6, 9, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        
        border: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9);
    }

    .logo {
        font-family: 'Syne', sans-serif;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.5px;
        cursor: pointer;
        background: linear-gradient(90deg, #fff, var(--neon-cyan), var(--neon-purple), #fff);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: activeShine 4s linear infinite;
    }

    .right-nav {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .search-input {
        width: 180px;
        height: 40px;
        padding: 0 16px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(0, 0, 0, 0.4);
        color: white;
        font-family: inherit;
        outline: none;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .search-input:focus {
        width: 240px;
        border-color: var(--neon-cyan);
        box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
    }

    .sort-menu {
        height: 40px;
        padding: 0 12px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.08);
        background: rgba(0, 0, 0, 0.4);
        color: #aaa;
        font-family: inherit;
        cursor: pointer;
        outline: none;
    }
    .sort-menu:focus { border-color: var(--neon-purple); color: #fff;}

    .nav-btn {
        height: 40px;
        padding: 0 18px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        text-decoration: none;
        font-weight: 700;
        font-size: 13px;
        box-sizing: border-box;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .discord {
        background: rgba(88, 101, 242, 0.1);
        color: #9ca3af;
        border: 1px solid rgba(88, 101, 242, 0.3);
    }
    .discord:hover {
        background: var(--discord-color);
        color: white;
        transform: translateY(-1px);
    }

    .theo {
        background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
        color: white;
    }
    .theo:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(168, 85, 247, 0.4);
    }

    /* ===================== */
    /* STREAMLINED STATS     */
    /* ===================== */

    .stats-hub {
        width: min(960px, 92vw);
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
        margin-bottom: 8px;
    }

    .stat-card {
        background: rgba(10, 10, 15, 0.4);
        border: 1px solid rgba(255,255,255,0.03);
        border-radius: 16px;
        padding: 14px 20px;
        backdrop-filter: blur(10px);
    }
    .stat-tag { font-size: 10px; text-transform: uppercase; color: #6b7280; font-weight: 700; letter-spacing: 1px; }
    .stat-info { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-top: 2px; }
    .stat-card:nth-child(2) .stat-info { color: var(--neon-pink); }

    /* ===================== */
    /* CARD ARCHITECTURE     */
    /* ===================== */

    .main-wrapper {
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0 16px 60px 16px;
        gap: 20px;
        box-sizing: border-box;
    }

    .level-card {
        width: min(960px, 92vw);
        height: 200px; /* Reduced box footprint */
        display: flex;
        border-radius: 20px;
        overflow: hidden;
        background: var(--card-surface);
        border: 1px solid rgba(255, 255, 255, 0.04);
        box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        position: relative;
        opacity: 0;
        transform: translateY(25px);
    }

    @keyframes cardFadeIn {
        to { opacity: 1; transform: translateY(0); }
    }

    .level-card:hover {
        border-color: rgba(168, 85, 247, 0.3);
        box-shadow: 0 20px 45px rgba(0,0,0,0.8), 0 0 30px var(--border-glow);
    }

    /* VIDEO REGION */
    .video-area { 
        width: 35%; height: 100%; 
        position: relative; cursor: pointer;
        background: #000; overflow: hidden;
        flex-shrink: 0;
    }
    .video-area img, .display-area img { 
        width: 100%; height: 100%; object-fit: cover; 
        transition: transform 0.5s ease;
    }
    .level-card:hover .video-area img, .level-card:hover .display-area img { transform: scale(1.04); }
    .video-area iframe { width: 100%; height: 100%; border: none; }

    /* ACTION/PLAY HUD LAYER */
    .play-shroud {
        position: absolute; inset: 0;
        background: rgba(0, 0, 0, 0.3);
        display: flex; justify-content: center; align-items: center;
        transition: background 0.2s;
    }
    .video-area:hover .play-shroud { background: rgba(0, 0, 0, 0.1); }
    
    .radial-play {
        width: 48px; height: 48px;
        background: rgba(10,10,15,0.6);
        border: 1px solid rgba(255,255,255,0.3);
        backdrop-filter: blur(8px);
        border-radius: 50%;
        display: flex; justify-content: center; align-items: center;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .radial-play::after {
        content: ''; border-top: 8px solid transparent; border-bottom: 8px solid transparent;
        border-left: 14px solid white; margin-left: 4px;
    }
    .video-area:hover .radial-play {
        transform: scale(1.1);
        background: white;
    }
    .video-area:hover .radial-play::after { border-left-color: black; }

    /* CORE CONTENT SPLIT (STABLE FLEX CONTROLLER) */
    .display-area { 
        width: 65%; height: 100%; 
        position: relative; 
        overflow: hidden; 
    }

    .meta-content-holder {
        position: absolute;
        inset: 0;
        z-index: 2;
        background: linear-gradient(90deg, #0a0a0f 0%, rgba(10,10,15,0.85) 45%, rgba(10,10,15,0.3) 100%);
        padding: 24px;
        box-sizing: border-box;
        
        display: flex;
        flex-direction: column;
        justify-content: space-between; /* Dynamically pushes content to top/bottom safely */
    }

    .meta-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
    }

    .title-block {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    
    .rank-tag {
        background: #161622;
        border: 1px solid rgba(6, 182, 212, 0.3);
        color: var(--neon-cyan);
        padding: 3px 8px; border-radius: 8px;
        font-weight: 700; font-size: 13px;
    }

    .level-name { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; }
    
    .creator-info { font-size: 13px; color: #9ca3af; margin-top: 6px; font-weight: 400; }
    .creator-info b { color: #fff; font-weight: 500; }

    .chance-metric {
        font-family: 'Syne', sans-serif;
        font-weight: 800; font-size: 20px;
        color: var(--neon-purple);
        text-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
    }

    .meta-bottom {
        display: flex;
        justify-content: flex-end;
    }

    .record-btn {
        padding: 6px 14px; border-radius: 8px;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.1);
        font-size: 12px; font-weight: 700; text-decoration: none; color: white;
        transition: all 0.2s;
    }
    .record-btn:hover {
        background: white; color: black;
    }

    .no-results {
        text-align: center; padding: 40px; width: 100%;
        border: 1px dashed rgba(255,255,255,0.08); border-radius: 16px;
        color: #4b5563; display: none;
    }

    /* ================================== */
    /* ⚡ ULTRA-STABLE MOBILE SCROLLING   */
    /* ================================== */

    @media(max-width: 800px) {
        .navbar {
            flex-direction: column; height: auto;
            padding: 16px; border-radius: 16px; gap: 12px; top: 8px; width: 94%;
        }
        .right-nav { 
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px; width: 100%; 
        }
        .search-input { width: 100% !important; grid-column: 1/-1; }
        body { padding-top: 190px; }
        
        .stats-hub { width: 94%; gap: 10px; }
        .stat-info { font-size: 16px; }

        .main-wrapper { width: 100%; padding: 0 12px 40px 12px; gap: 16px; }

        /* Structural Flip: absolute layout eliminated completely */
        .level-card { 
            flex-direction: column; 
            height: auto; 
            width: 94vw;
            border-radius: 16px;
        }
        .video-area { width: 100%; height: 180px; }
        .display-area { width: 100%; height: auto; }
        
        .meta-content-holder {
            position: relative; /* Returns element into native block flow */
            padding: 16px;
            background: #0a0a0f; /* Fixed opaque color to maximize reading safety */
            gap: 16px;
        }
        
        .meta-top { flex-direction: column; justify-content: flex-start; align-items: flex-start; gap: 8px; }
        .chance-metric { font-size: 18px; align-self: flex-start; margin-top: 2px;}
        .meta-bottom { width: 100%; }
        .record-btn { width: 100%; text-align: center; box-sizing: border-box; }
    }

    @keyframes activeShine {
        0% { background-position: 0% center; }
        100% { background-position: 200% center; }
    }
</style>
</head>

<body>

<div class="bg-matrix"></div>

<div class="navbar">
    <div class="logo" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        Luck Based List
    </div>

    <div class="right-nav">
        <input type="text" id="searchBar" class="search-input" placeholder="Search data...">
        
        <select id="sortSelect" class="sort-menu">
            <option value="place">Placement</option>
            <option value="chance">Rarity</option>
            <option value="alpha">A-Z Name</option>
        </select>

        <a class="nav-btn theo" href="YOUR_LINK_HERE" target="_blank">Theoretic</a>
        <a class="nav-btn discord" href="YOUR_DISCORD_LINK" target="_blank">Discord</a>
    </div>
</div>

<div class="main-wrapper">
    <!-- RECONFIGURED 2-COLUMN DISPLAY BLOCK -->
    <div class="stats-hub">
        <div class="stat-card">
            <div class="stat-tag">Documented Entries</div>
            <div class="stat-info" id="statTotal">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-tag">Absolute Pinnacle</div>
            <div class="stat-info" id="statHardest">-</div>
        </div>
    </div>

    <!-- CLEAN OUTPUT CONSOLE CONTAINER -->
    <div id="container" style="width:100%; display:flex; flex-direction:column; align-items:center; gap:20px;"></div>
    
    <div id="noResults" class="no-results">
        No records match active parameters.
    </div>
</div>

<script>
let container = document.getElementById("container");
let searchBar = document.getElementById("searchBar");
let sortSelect = document.getElementById("sortSelect");
let noResults = document.getElementById("noResults");
let levelsData = [];

window.playVideo = function(element, videoId) {
    element.innerHTML = `
        <iframe 
            src="https://www.youtube.com/embed/${videoId}?autoplay=1" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>`;
    element.style.cursor = 'default';
};

function refreshMetrics(data) {
    if(data.length === 0) {
        document.getElementById("statTotal").innerText = "0";
        document.getElementById("statHardest").innerText = "-";
        return;
    }
    document.getElementById("statTotal").innerText = data.length;
    let pinnacle = data.reduce((min, item) => item.place < min.place ? item : min, data[0]);
    document.getElementById("statHardest").innerText = pinnacle ? `#${pinnacle.place} ${pinnacle.name}` : "-";
}

function render(data){
    container.innerHTML = "";
    
    if(data.length === 0) {
        noResults.style.display = "block";
        return;
    }
    noResults.style.display = "none";

    data.forEach((l, idx) => {
        let card = document.createElement("div");
        card.className = "level-card";
        card.style.animation = `cardFadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards ${idx * 0.05}s`;

        card.innerHTML = `
        <div class="video-area" onclick="playVideo(this, '${l.youtube}')">
            <img src="https://img.youtube.com/vi/${l.youtube}/hqdefault.jpg" alt="Thumbnail">
            <div class="play-shroud"><div class="radial-play"></div></div>
        </div>
        <div class="display-area">
            <img src="${l.gif}" alt="Visual BG" style="position:absolute; inset:0; z-index:1;">
            <div class="meta-content-holder">
                <div class="meta-top">
                    <div class="info-group">
                        <div class="title-block">
                            <div class="rank-tag">#${l.place}</div>
                            <div class="level-name">${l.name}</div>
                        </div>
                        <div class="creator-info">By <b>${l.author}</b> • ID: ${l.id}</div>
                    </div>
                    <div class="chance-metric">${l.chance}</div>
                </div>
                <div class="meta-bottom">
                    <a class="record-btn" href="${l.wrLink}" target="_blank">🏆 ${l.wrName}</a>
                </div>
            </div>
        </div>
        `;
        container.appendChild(card);
    });
}

function processLayoutPipeline() {
    let query = searchBar.value.toLowerCase();
    let criteria = sortSelect.value;

    let altered = levelsData.filter(l =>
        l.name.toLowerCase().includes(query) ||
        l.author.toLowerCase().includes(query) ||
        String(l.id).includes(query)
    );

    if(criteria === "place") {
        altered.sort((a,b) => a.place - b.place);
    } else if (criteria === "chance") {
        altered.sort((a,b) => parseFloat(a.chance) - parseFloat(b.chance));
    } else if (criteria === "alpha") {
        altered.sort((a,b) => a.name.localeCompare(b.name));
    }

    render(altered);
}

fetch("levels.json")
.then(r => r.json())
.then(data => {
    levelsData = data;
    refreshMetrics(levelsData);
    processLayoutPipeline();
})
.catch(() => {
    // Elegant fallback simulation content for instant staging environment evaluation
    levelsData = [
        { place: 1, name: "VSC", author: "BoBoBo", id: "666666", chance: "0.001%", youtube: "dQw4w9WgXcQ", gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM3VwY2NmdXJvYmdkMDNnbW96ZHZ0b3E0bWN6ZnA1bWxpY3p6bXF6dyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/3o7Tov7edZ6tTuOg8w/giphy.gif", wrLink: "#", wrName: "Paqeo" },
        { place: 2, name: "Tartarus", author: "Riot", id: "123456", chance: "0.052%", youtube: "dQw4w9WgXcQ", gif: "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExM2VwYm81b3ZkM3JicnpqNDVhcWpxZnNwbTVvNXZpdXp0cHhrNDRxbyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/l0HlHFRbmaZtBRhXG/giphy.gif", wrLink: "#", wrName: "Mefewe" }
    ];
    refreshMetrics(levelsData);
    processLayoutPipeline();
});

searchBar.addEventListener("input", processLayoutPipeline);
sortSelect.addEventListener("change", processLayoutPipeline);
</script>

</body>
</html>
