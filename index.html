<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;}

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
    font-family:'Rubik', sans-serif;
}

.box{
    width:100%;
    height:100dvh;
    border-radius:20px;
    overflow:hidden;
    border:2px solid white;
    display:flex;
    position:relative;
}

/* LEFT */
.left{width:33.33%;height:100%;}
.left iframe{width:100%;height:100%;border:none;}

/* RIGHT */
.right{width:66.66%;height:100%;position:relative;}
.right img{width:100%;height:100%;object-fit:cover;display:block;}

/* HUD */
.hud{
    position:absolute;
    top:12px;left:12px;right:12px;
    display:flex;
    justify-content:space-between;
    z-index:10;
}

.label{font-size:28px;font-weight:800;color:white;}
.sub{color:rgba(255,255,255,0.8);}
.id{font-size:12px;color:gray;}

.fps{font-size:20px;font-weight:800;color:white;}

.wr-bottom{
    position:absolute;
    right:12px;
    bottom:12px;
    background:rgba(255,255,255,0.2);
    padding:6px 10px;
    border-radius:10px;
    color:white;
    text-decoration:none;
}
</style>
</head>

<body>

<div class="box">

    <div class="left">
        <iframe id="yt" allowfullscreen></iframe>
    </div>

    <div class="right">

        <div class="hud">
            <div>
                <div class="label" id="title">Loading...</div>
                <div class="sub">
                    by <span id="author"></span><br>
                    <span class="id" id="id"></span>
                </div>
            </div>

            <div class="fps" id="chance"></div>
        </div>

        <img id="gif">

        <a class="wr-bottom" id="wr" target="_blank"></a>

    </div>

</div>

<script>
let levelName = "Midnight Night"; // <<< TU ZMIENIASZ LEVEL

fetch("levels.json")
.then(r => r.json())
.then(data => {

    let level = data.find(l => l.name === levelName);

    document.getElementById("title").textContent =
        "#" + level.place + " " + level.name;

    document.getElementById("author").textContent = level.author;
    document.getElementById("id").textContent = "id:" + level.id;
    document.getElementById("chance").textContent = "Chance: " + level.chance;

    document.getElementById("yt").src =
        "https://www.youtube.com/embed/" + level.youtube;

    document.getElementById("gif").src = level.gif;

    document.getElementById("wr").textContent = level.wrName;
    document.getElementById("wr").href = level.wrLink;

});
</script>

</body>
</html>
