<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:black;
    font-family:'Rubik', sans-serif;
    color:white;
    overflow-x:hidden;
}

/* CONTAINER */
.container{
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:20px;
    gap:15px;
}

/* CARD */
.card{
    width: min(900px, 95vw);
    height: 220px;

    display:flex;
    border-radius:18px;
    overflow:hidden;

    border:2px solid white;
    background:#0a0a0a;

    position:relative;
}

/* LEFT THUMBNAIL */
.left{
    width:35%;
    height:100%;
}

.left img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* RIGHT IMAGE */
.right{
    width:65%;
    height:100%;
}

.right img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* INFO */
.info{
    position:absolute;
    top:10px;
    left:10px;
}

/* TEXTS */
.title{
    font-size:20px;
    font-weight:800;
}

.sub{
    font-size:12px;
    opacity:0.8;
    line-height:1.2;
}

/* CHANCE */
.chance{
    position:absolute;
    top:10px;
    right:10px;
    font-weight:800;
}

/* WR */
.wr{
    position:absolute;
    bottom:10px;
    right:10px;

    padding:5px 10px;
    border-radius:12px;

    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.5);

    font-size:12px;
    text-decoration:none;
    color:white;
}

/* 📱 MOBILE FIX */
@media (max-width: 768px){
    .card{
        height:200px;
    }
}

@media (max-width: 480px){
    .card{
        height:180px;
    }

    .title{
        font-size:16px;
    }
}

/* ========================= */
/* 🔥 TEXT STROKE (OUTLINE) */
/* ========================= */

.title,
.sub,
.chance,
.wr{
    text-shadow:
        -1px -1px 0 #000,
         1px -1px 0 #000,
        -1px  1px 0 #000,
         1px  1px 0 #000;
}

</style>
</head>

<body>

<div class="container" id="container"></div>

<script>

fetch("levels.json")
.then(r => r.json())
.then(data => {

    const container = document.getElementById("container");

    data.sort((a,b) => a.place - b.place);

    data.forEach(l => {

        const card = document.createElement("div");
        card.className = "card";

        /* LEFT THUMBNAIL */
        const left = document.createElement("div");
        left.className = "left";

        const thumb = document.createElement("img");
        thumb.src = `https://img.youtube.com/vi/${l.youtube}/hqdefault.jpg`;

        left.appendChild(thumb);

        /* RIGHT IMAGE */
        const right = document.createElement("div");
        right.className = "right";

        const img = document.createElement("img");
        img.src = l.gif;
        img.loading = "lazy";

        right.appendChild(img);

        /* INFO */
        const info = document.createElement("div");
        info.className = "info";

        info.innerHTML = `
            <div class="title">#${l.place} ${l.name}</div>
            <div class="sub">by ${l.author}<br>id: ${l.id}</div>
        `;

        /* CHANCE */
        const chance = document.createElement("div");
        chance.className = "chance";
        chance.textContent = l.chance;

        /* WR */
        const wr = document.createElement("a");
        wr.className = "wr";
        wr.href = l.wrLink;
        wr.target = "_blank";
        wr.textContent = l.wrName;

        card.appendChild(left);
        card.appendChild(right);
        card.appendChild(info);
        card.appendChild(chance);
        card.appendChild(wr);

        container.appendChild(card);

    });

});

</script>

</body>
</html>
